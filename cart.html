<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RON-ITEMS Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* font-family: Arial, sans-serif; */
            background-color: rgba(228, 158, 158, 0.1);
            color: #333;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(224, 174, 174, 0.9);
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 {
            font-size: 1.4rem;
            color: #000;
        }
        nav ul {
            display: flex;
            gap: 10px;
            list-style: none;
            align-items: center;
        }
        nav a,
        .cart-btn {
            text-decoration: none;
            color: #000;
            background-color: rgb(86, 41, 41);
            border: none;
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            color: white;
        }
        nav a:hover,
        .cart-btn:hover {
            background-color: rgb(224, 174, 174);
            color: black;
        }
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .cart-summary h2 {
            margin-bottom: 20px;
            color: rgb(86, 41, 41);
        }
        .cart-items {
            display: grid;
            gap: 12px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            background: rgba(224, 174, 174, 0.12);
        }
        .cart-item button {
            background-color: rgb(86, 41, 41);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .cart-item button:hover {
            background-color: rgb(224, 174, 174);
            color: black;
        }
        .cart-total {
            margin-top: 22px;
            font-size: 1.25rem;
            font-weight: bold;
            color: rgb(86, 41, 41);
        }
        .cart-empty {
            padding: 20px;
            text-align: center;
            font-size: 1rem;
            color: rgb(86, 41, 41);
        }
        .actions {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .secondary-btn {
            background-color: white;
            color: rgb(86, 41, 41);
            border: 2px solid rgb(86, 41, 41);
            border-radius: 6px;
            padding: 12px 18px;
            cursor: pointer;
        }
        .secondary-btn:hover {
            background-color: rgb(224, 174, 174);
            color: black;
        }
        .ron{
            font-size: 2.0em;
        }
        @media(max-width: 480px){
            /* nav a{
            display: block;
            } */

             header{ 
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            height: auto;
            padding: 10px 0;
        }
        nav ul{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            width: 100%;
            justify-content: center;
        }
        nav a{
            display: flex;
            gap: 5px;
            margin: 10px;
        }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="ron">RON-ITEMS</h1>
        <nav>
            <ul>
                <li><a href="items.html">Back to Shop</a></li>
                <li><button id="clearCart" class="secondary-btn">Clear Cart</button></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <section class="cart-summary">
            <h2>Shopping Cart</h2>
            <div class="cart-items"></div>
            <div class="cart-total">Total: ₦<span id="cart-total">0</span></div>
            <div class="actions">
                <button id="checkoutBtn" class="cart-btn">Checkout</button>
            </div>
        </section>
    </div>

    <script>
        const CART_STORAGE_KEY = 'ronItemsCart';
        const cartItemsContainer = document.querySelector('.cart-items');
        const cartTotalElement = document.getElementById('cart-total');
        const clearCartButton = document.getElementById('clearCart');
        const checkoutBtn = document.getElementById('checkoutBtn');

        let cart = JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || '[]');

        function saveCart() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
        }

        function formatPrice(value) {
            return Number(value).toLocaleString('en-US');
        }

        function updateCartUI() {
            cartItemsContainer.innerHTML = '';
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
                cartTotalElement.textContent = '0';
                checkoutBtn.disabled = true;
                checkoutBtn.style.opacity = '0.6';
                return;
            }

            checkoutBtn.disabled = false;
            checkoutBtn.style.opacity = '1';

            let totalPrice = 0;
            cart.forEach(item => {
                totalPrice += item.price * item.quantity;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        Qty: ${item.quantity}
                    </div>
                    <div>
                        ₦${formatPrice(item.price * item.quantity)}
                        <button type="button">Remove</button>
                    </div>
                `;

                const removeButton = itemDiv.querySelector('button');
                removeButton.addEventListener('click', () => {
                    cart = cart.filter(cartItem => cartItem.id !== item.id);
                    saveCart();
                    updateCartUI();
                });

                cartItemsContainer.appendChild(itemDiv);
            });

            cartTotalElement.textContent = formatPrice(totalPrice);
        }

        clearCartButton.addEventListener('click', () => {
            cart = [];
            saveCart();
            updateCartUI();
        });

        checkoutBtn.addEventListener('click', () => {
            alert('Checkout flow is not implemented yet.');
        });

        updateCartUI();
    </script>
</body>
</html>
